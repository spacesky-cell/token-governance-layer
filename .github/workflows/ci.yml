name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install project and test tools
        run: python -m pip install --upgrade --editable . pytest pytest-asyncio ruff
      - name: Ruff
        run: python -m ruff check src tests benchmarks scripts .github/scripts
      - name: Compile
        run: python -m compileall -q src tests benchmarks scripts .github/scripts
      - name: Test
        run: python -m pytest -q

  node-package:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: https://registry.npmjs.org
      - name: Install wrapper test tools
        run: python -m pip install --upgrade pytest pytest-asyncio
      - name: Verify wrapper contract
        run: python -m pytest -q tests/test_npm_wrapper.py
      - name: Verify package manifest
        run: npm pack --dry-run --json

  docs-and-benchmark:
    name: Docs, benchmark, and metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Install project and YAML parser
        run: python -m pip install --upgrade --editable . pyyaml
      - name: Verify release tooling
        run: python scripts/release_selftest.py
      - name: Reproduce benchmark
        run: python -m benchmarks.run --manifest benchmarks/fixtures/manifest.json --output .tgl/benchmark-v0.2.0.json
      - name: Compare canonical result
        run: python -c "from pathlib import Path; a=Path('.tgl/benchmark-v0.2.0.json').read_bytes(); b=Path('benchmarks/results/v0.2.0.json').read_bytes(); raise SystemExit(0 if a == b else 1)"
      - name: Check README benchmark bindings
        run: |
          python -m benchmarks.check_readme --results benchmarks/results/v0.2.0.json --readme README.md
          python -m benchmarks.check_readme --results benchmarks/results/v0.2.0.json --readme README.zh-CN.md
      - name: Check docs, links, privacy, workflow, and metadata
        run: python .github/scripts/check_public_docs.py
      - name: Check package contents
        run: npm pack --dry-run --json
